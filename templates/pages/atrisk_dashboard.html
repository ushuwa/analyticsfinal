<style>
    :root {
        --dashboard-green: #238b45;
        --border-black: #000;
        --ppi-crimson: #800020;
        --light-gray: #f8f9fa;
        --bg: #e1e3e5 !important;
        --border-color: #e9ecef;
        --text-dark: #333;
    }

    #dashboard {
        padding: 20px;
        background-color: #fff;
        font-family: 'Inter', -apple-system, sans-serif;
    }

    .page-title {
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-dark);
    }

    /* Green Underlined Headers */
    .section-title {
      color: var(--text-dark) !important;
      font-family: 'Impact', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      border-bottom: 2px solid var(--border-black);
      display: block;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }

    /* Containers */
    .map-container { border: 1px solid var(--border-black); padding: 15px; height: 100%; min-height: 500px; }
    .list-box { border: 1px solid var(--border-black); min-height: 250px; padding: 15px; margin-bottom: 25px; }

    /* Chart Layouts */
    .risk-grid { display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px; }
    .donut-wrapper { width: 32%; text-align: center; position: relative; }
    .chart-container { position: relative; height: 120px; width: 100%; }
    
    /* Percentage text inside donut */
    .donut-text {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Impact', sans-serif;
        font-size: 1.5rem;
    }

    .donut-label { font-weight: 900; font-size: 0.9rem; color: #666; margin-top: 5px; }
    .trend-container { height: 300px; width: 100%; }
</style>

<div class="container-fluid dashboard-container" id="dashboard">
    <div class="row mb-2">
        <div class="col-12">
            <h1 class="page-title" style="font-size: 2rem;">RISK SCORE DASHBOARD</h1>
        </div>
    </div>
    
    <div class="row mb-2">
        <div class="col-12">
            <label class="fw-bold me-2">Filter by:</label>
            <select class="form-select d-inline-block w-auto"><option></option></select>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4">
            <div class="map-container text-center">
                <img src="{{ url_for('static', filename='hyper/image/ph.svg') }}" style="margin: 10px -90px;width: 100%;min-width: 500px;margin-top: 50px;opacity: 0.8;">
            </div>
        </div>

        <div class="col-lg-3">
            <h2 class="section-title">TOP HIGH RISK BRANCH</h2>
            <div id="branchListContainer" class="list-box"></div>

            <h2 class="section-title">TOP HIGH RISK CLIENTS</h2>
            <div class="list-box">
                <ol id="highRiskClientsList" style="font-weight: 700; font-size: 0.8rem; line-height: 1.6;"></ol>
            </div>
        </div>

        <div class="col-lg-5">
            <h2 class="section-title">PERCENTAGE OF AT RISK CLIENT</h2>
            <div class="risk-grid">
                <div class="donut-wrapper">
                    <div class="chart-container"><canvas id="lowDonut"></canvas></div>
                    <div class="donut-text" id="lowText">0%</div>
                    <div class="donut-label">LOW RISK</div>
                </div>
                <div class="donut-wrapper">
                    <div class="chart-container"><canvas id="medDonut"></canvas></div>
                    <div class="donut-text" id="medText">0%</div>
                    <div class="donut-label">MEDIUM RISK</div>
                </div>
                <div class="donut-wrapper">
                    <div class="chart-container"><canvas id="highDonut"></canvas></div>
                    <div class="donut-text" id="highText">0%</div>
                    <div class="donut-label">HIGH RISK</div>
                </div>
            </div>

            <h2 class="section-title">RISK TREND</h2>
            <div class="trend-container">
                <canvas id="riskTrendChart"></canvas>
            </div>
        </div>
    </div>
</div>
